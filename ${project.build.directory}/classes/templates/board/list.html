<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-3">게시판</h1>
<a href="/board/write" class="btn btn-primary mb-3">글쓰기</a>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boardList}">
        <td th:text="${board.id}"></td>
        <td><a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
        <td th:text="${board.writer}"></td>
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    </tbody>
</table>
<div class="d-flex gap-2">
    <a th:if="${currentPage > 0}"
       th:href="@{/board(page=${currentPage - 1})}"
       class="btn btn-outline-secondary">이전</a>
    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/board(page=${i})}"
               th:text="${i + 1}"
               th:class="${i == currentPage} ? 'btn btn-primary' : 'btn btn-outline-primary'"></a>
        </span>
    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/board(page=${currentPage + 1})}"
       class="btn btn-outline-secondary">다음</a>
</div>
</body>
</html>
