services:
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    environment:
      ORACLE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/${DB_PASSWORD}@//localhost:1521/XEPDB1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  app:
    build: .
    container_name: spring-board
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:oracle:thin:@db:1521/XEPDB1
      DB_USERNAME: system
      DB_PASSWORD: ${DB_PASSWORD}
      FILE_UPLOAD_PATH: /upload/board/
    volumes:
      - upload_data:/upload/board
    depends_on:
      db:
        condition: service_healthy

volumes:
  oracle_data:
  upload_data:
