<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-3">글쓰기</h1>

<div th:if="${param.error}" class="alert alert-danger">
    허용되지 않는 파일 형식입니다. (jpg, png, gif만 가능)
</div>

<form th:action="@{/board/write}" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">작성자</label>
        <input type="text" name="writer" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="5"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">이미지 첨부 (jpg, png, gif)</label>
        <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.gif">
    </div>
    <button type="submit" class="btn btn-primary">저장</button>
    <a href="/board" class="btn btn-outline-secondary">목록으로</a>
</form>
</body>
</html>
