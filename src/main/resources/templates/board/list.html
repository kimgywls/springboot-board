<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">게시판</h1>
    <div class="d-flex gap-2 align-items-center">
        <span sec:authorize="isAuthenticated()" class="text-muted"
              th:text="${#authentication.name} + '님'"></span>
        <form sec:authorize="isAuthenticated()" th:action="@{/member/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
        <a sec:authorize="!isAuthenticated()" href="/member/login" class="btn btn-outline-primary btn-sm">로그인</a>
        <a sec:authorize="!isAuthenticated()" href="/member/register" class="btn btn-outline-secondary btn-sm">회원가입</a>
    </div>
</div>

<form th:action="@{/board}" method="get" class="d-flex gap-2 mb-3">
    <select name="searchType" class="form-select w-auto">
        <option value="all"    th:selected="${searchType == 'all'}">전체</option>
        <option value="title"  th:selected="${searchType == 'title'}">제목</option>
        <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
    </select>
    <input type="text" name="keyword" th:value="${keyword}"
           class="form-control" placeholder="검색어를 입력하세요">
    <button type="submit" class="btn btn-outline-secondary">검색</button>
</form>

<a sec:authorize="isAuthenticated()" href="/board/write" class="btn btn-primary mb-3">글쓰기</a>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
        <th>조회수</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${boardList.isEmpty()}">
        <td colspan="5" class="text-center text-muted">검색 결과가 없습니다.</td>
    </tr>
    <tr th:each="board : ${boardList}">
        <td th:text="${board.id}"></td>
        <td><a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
        <td th:text="${board.writer}"></td>
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${board.viewCount}"></td>
    </tr>
    </tbody>
</table>

<div th:if="${totalPages > 0}" class="d-flex gap-2">
    <a th:if="${currentPage > 0}"
       th:href="@{/board(page=${currentPage - 1}, keyword=${keyword}, searchType=${searchType})}"
       class="btn btn-outline-secondary">이전</a>
    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:href="@{/board(page=${i}, keyword=${keyword}, searchType=${searchType})}"
           th:text="${i + 1}"
           th:class="${i == currentPage} ? 'btn btn-primary' : 'btn btn-outline-primary'"></a>
    </span>
    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/board(page=${currentPage + 1}, keyword=${keyword}, searchType=${searchType})}"
       class="btn btn-outline-secondary">다음</a>
</div>
</body>
</html>
