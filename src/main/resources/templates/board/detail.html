<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-3">게시글 상세</h1>

<div th:if="${param.error != null and param.error[0] == 'forbidden'}"
     class="alert alert-danger">권한이 없습니다.</div>

<table class="table table-bordered">
    <tr>
        <th class="table-dark" style="width:15%">번호</th>
        <td th:text="${board.id}"></td>
    </tr>
    <tr>
        <th class="table-dark">제목</th>
        <td th:text="${board.title}"></td>
    </tr>
    <tr>
        <th class="table-dark">작성자</th>
        <td th:text="${board.writer}"></td>
    </tr>
    <tr>
        <th class="table-dark">작성일</th>
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    <tr>
        <th class="table-dark">내용</th>
        <td th:text="${board.content}"></td>
    </tr>
    <tr th:if="${board.filePath != null}">
        <th class="table-dark">첨부 이미지</th>
        <td>
            <img th:src="${board.filePath}" class="img-fluid" style="max-width:500px">
            <div class="form-text mt-1" th:text="${board.fileName}"></div>
        </td>
    </tr>
</table>

<div class="d-flex gap-2">
    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == board.writer}">
        <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn btn-warning">수정</a>
        <a th:href="@{/board/delete/{id}(id=${board.id})}" class="btn btn-danger"
           onclick="return confirm('게시글을 삭제하시겠습니까?')">삭제</a>
    </div>
    <a href="/board" class="btn btn-outline-secondary">목록으로</a>
</div>

<!-- 댓글 섹션 -->
<div class="mt-4">
    <h5>댓글 <span class="badge bg-secondary" th:text="${#lists.size(comments)}"></span></h5>
    <hr>

    <div th:if="${#lists.isEmpty(comments)}" class="text-muted mb-3">첫 번째 댓글을 남겨보세요.</div>

    <div th:each="comment : ${comments}" class="card mb-2">
        <div class="card-body py-2 px-3">

            <!-- 보기 모드 -->
            <div th:id="'view-' + ${comment.id}">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong th:text="${comment.writer}"></strong>
                        <span class="text-muted ms-2 small"
                              th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        <p class="mb-0 mt-1" th:text="${comment.content}"></p>
                    </div>
                    <div sec:authorize="isAuthenticated()"
                         th:if="${#authentication.name == comment.writer}"
                         class="d-flex gap-1 ms-2 flex-shrink-0">
                        <button type="button"
                                th:onclick="'toggleEdit(' + ${comment.id} + ')'"
                                class="btn btn-sm btn-outline-secondary">수정</button>
                        <a th:href="@{/comment/delete/{id}(id=${comment.id}, boardId=${board.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('댓글을 삭제하시겠습니까?')">삭제</a>
                    </div>
                </div>
            </div>

            <!-- 수정 모드 -->
            <div th:id="'edit-' + ${comment.id}" style="display:none">
                <form th:action="@{/comment/update/{id}(id=${comment.id})}" method="post">
                    <input type="hidden" name="boardId" th:value="${board.id}">
                    <div class="input-group">
                        <input type="text" name="content" th:value="${comment.content}"
                               class="form-control" maxlength="500" required>
                        <button type="submit" class="btn btn-primary">저장</button>
                        <button type="button"
                                th:onclick="'toggleEdit(' + ${comment.id} + ')'"
                                class="btn btn-outline-secondary">취소</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <div sec:authorize="isAuthenticated()" class="mt-3">
        <form th:action="@{/comment/write}" method="post">
            <input type="hidden" name="boardId" th:value="${board.id}">
            <div class="input-group">
                <input type="text" name="content" class="form-control"
                       placeholder="댓글을 입력하세요" maxlength="500" required>
                <button type="submit" class="btn btn-primary">등록</button>
            </div>
        </form>
    </div>

    <div sec:authorize="!isAuthenticated()" class="mt-3 text-muted">
        댓글을 작성하려면 <a href="/member/login">로그인</a>이 필요합니다.
    </div>
</div>

<script>
    function toggleEdit(id) {
        const view = document.getElementById('view-' + id);
        const edit = document.getElementById('edit-' + id);
        view.style.display = view.style.display === 'none' ? '' : 'none';
        edit.style.display = edit.style.display === 'none' ? '' : 'none';
    }
</script>
</body>
</html>
