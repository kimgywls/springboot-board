<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-3">게시글 상세</h1>
<table class="table table-bordered">
    <tr>
        <th class="table-dark" style="width:15%">번호</th>
        <td th:text="${board.id}"></td>
    </tr>
    <tr>
        <th class="table-dark">제목</th>
        <td th:text="${board.title}"></td>
    </tr>
    <tr>
        <th class="table-dark">작성자</th>
        <td th:text="${board.writer}"></td>
    </tr>
    <tr>
        <th class="table-dark">작성일</th>
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    <tr>
        <th class="table-dark">내용</th>
        <td th:text="${board.content}"></td>
    </tr>
    <tr th:if="${board.filePath != null}">
        <th class="table-dark">첨부 이미지</th>
        <td>
            <img th:src="${board.filePath}" class="img-fluid" style="max-width:500px">
            <div class="form-text mt-1" th:text="${board.fileName}"></div>
        </td>
    </tr>
</table>
<div class="d-flex gap-2">
    <div sec:authorize="isAuthenticated()">
        <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn btn-warning">수정</a>
        <a th:href="@{/board/delete/{id}(id=${board.id})}" class="btn btn-danger">삭제</a>
    </div>
    <a href="/board" class="btn btn-outline-secondary">목록으로</a>
</div>
</body>
</html>
