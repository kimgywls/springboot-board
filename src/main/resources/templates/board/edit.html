<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-3">게시글 수정</h1>
<form th:action="@{/board/edit/{id}(id=${board.id})}" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" th:value="${board.title}">
    </div>
    <div class="mb-3">
        <label class="form-label">작성자</label>
        <input type="text" name="writer" class="form-control" th:value="${board.writer}">
    </div>
    <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="5" th:text="${board.content}"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">이미지 첨부 (jpg, png, gif)</label>
        <div th:if="${board.filePath != null}" class="mb-2">
            <img th:src="${board.filePath}" class="img-thumbnail" style="max-height:200px">
            <div class="form-text">현재 첨부된 이미지</div>
        </div>
        <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.gif">
        <div class="form-text">새 파일을 선택하지 않으면 기존 이미지가 유지됩니다.</div>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">수정완료</button>
        <a th:href="@{/board/{id}(id=${board.id})}" class="btn btn-outline-secondary">취소</a>
    </div>
</form>
</body>
</html>
