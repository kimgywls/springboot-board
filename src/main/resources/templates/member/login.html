<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width:480px">
<h1 class="mb-4">로그인</h1>

<div th:if="${param.error}" class="alert alert-danger">
    아이디 또는 비밀번호가 올바르지 않습니다.
</div>

<form th:action="@{/member/login}" method="post">
    <div class="mb-3">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-control" autofocus>
    </div>
    <div class="mb-3">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control">
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">로그인</button>
        <a href="/member/register" class="btn btn-outline-secondary">회원가입</a>
        <a href="/board" class="btn btn-outline-secondary ms-auto">목록으로</a>
    </div>
</form>
</body>
</html>
